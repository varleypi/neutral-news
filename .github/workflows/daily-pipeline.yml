name: Daily Article Generation

# Runs at 08:00 EST (13:00 UTC) — after SpinDetector pipeline completes at ~07:00 EST
on:
  schedule:
    - cron: '0 13 * * *'
  workflow_dispatch:
    inputs:
      pipeline_date:
        description: 'Date to run for (YYYY-MM-DD). Defaults to today.'
        required: false

jobs:
  generate-articles:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: website

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: website/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run article generation pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
          SPINDETECTOR_SUPABASE_URL: ${{ secrets.SPINDETECTOR_SUPABASE_URL }}
          SPINDETECTOR_SUPABASE_SERVICE_KEY: ${{ secrets.SPINDETECTOR_SUPABASE_SERVICE_KEY }}
          NEUTRAL_NEWS_SUPABASE_URL: ${{ secrets.NEUTRAL_NEWS_SUPABASE_URL }}
          NEUTRAL_NEWS_SUPABASE_SERVICE_KEY: ${{ secrets.NEUTRAL_NEWS_SUPABASE_SERVICE_KEY }}
          PIPELINE_DATE: ${{ github.event.inputs.pipeline_date }}
        run: node pipeline/run.js
